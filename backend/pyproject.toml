[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]
python_files = ["test_*.py"]

[tool.ruff]
target-version = "py312"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "N", "UP", "B", "SIM", "ARG"]
ignore = ["E501", "B008"]

[tool.ruff.lint.per-file-ignores]
"marketplaces/*.py" = ["ARG002"]

[tool.ruff.format]
quote-style = "double"
